<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FairRide MBU</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FBBF24;
            --primary-color-transparent-1: rgba(251, 191, 36, 0.2);
            --bg-color: #111827;
            --card-bg-color: rgba(31, 41, 55, 0.6);
            --shadow-color: rgba(251, 191, 36, 0.5);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); }
        .card { background-color: var(--card-bg-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid var(--primary-color-transparent-1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-field { background-color: #374151; border: 1px solid #4b5563; border-radius: 0.5rem; color: #f3f4f6; }
        .input-field:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-color-transparent-1); }
        .primary-btn { background-color: var(--primary-color); color: #111827; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .primary-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -4px var(--shadow-color); }
        .animated-gradient-text { background: linear-gradient(90deg, #FCD34D, var(--primary-color), #f9fafb, var(--primary-color), #FCD34D); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: textGradientShift 4s linear infinite; }
        @keyframes textGradientShift { to { background-position: 200% center; } }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const role = (params.get('role') || 'student').toLowerCase();

            const title = document.getElementById('title');
            const subtitle = document.getElementById('subtitle');
            const identifierLabel = document.getElementById('identifier-label');
            const backLink = document.getElementById('back-link');
            const successBox = document.getElementById('success-box');
            const form = document.getElementById('reset-form');
            const identifierInput = document.getElementById('identifier');

            if (role === 'driver') {
                title.textContent = 'Reset Driver Password';
                subtitle.textContent = 'Enter your Driver ID or phone number to receive a reset link/OTP.';
                identifierLabel.textContent = 'Driver ID / Phone';
            } else if (role === 'admin') {
                title.textContent = 'Reset Admin Password';
                subtitle.textContent = 'Enter your username or email to receive a reset link.';
                identifierLabel.textContent = 'Username / Email';
            } else {
                title.textContent = 'Reset Student Password';
                subtitle.textContent = 'Enter your Student ID or email to receive a reset link.';
                identifierLabel.textContent = 'Student ID / Email';
            }

            backLink.href = 'index.html';

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const value = identifierInput.value.trim();
                if (!value) {
                    alert('Please enter your identifier.');
                    return;
                }
                successBox.classList.remove('hidden');
                document.getElementById('sent-to').textContent = value;
            });
        });
    </script>
        <link rel="stylesheet" href="assets/floating-autos.css">
</head>
<body class="antialiased text-slate-200">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <header class="mb-6 text-center">
            <a href="index.html" class="text-2xl font-black text-slate-50"><span class="animated-gradient-text">FairRide MBU</span></a>
        </header>
        <main class="w-full max-w-md">
            <section class="card p-8">
                <h1 id="title" class="text-2xl md:text-3xl font-bold text-slate-50 text-center mb-2">Reset Password</h1>
                <p id="subtitle" class="text-center text-sm text-slate-400 mb-6">Enter your details to receive a reset link.</p>
                <form id="reset-form" class="space-y-4">
                    <div>
                        <label id="identifier-label" for="identifier" class="block text-sm font-semibold text-slate-300 mb-2">Account</label>
                        <input id="identifier" type="text" class="input-field w-full px-4 py-2.5" placeholder="yourid@mbu.asia">
                    </div>
                    <button type="submit" class="primary-btn w-full font-bold py-3 rounded-lg shadow-lg" style="--tw-shadow-color: var(--shadow-color);">Send Reset Link</button>
                </form>
                <div id="success-box" class="hidden mt-6 p-4 bg-slate-900/50 rounded-lg border border-slate-700 text-sm">
                    <p class="text-slate-300">If an account exists for <span id="sent-to" class="font-semibold text-amber-300"></span>, you will receive password reset instructions shortly.</p>
                </div>
                <p class="text-xs text-center mt-6 text-slate-400">Remembered your password? <a id="back-link" href="index.html" class="font-semibold hover:underline">Back to Login</a></p>
            </section>
        </main>
    </div>
    <script defer src="assets/floating-autos.js"></script>

</body>
</html>
