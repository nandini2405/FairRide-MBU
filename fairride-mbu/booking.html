<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Ride - FairRide MBU</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/phosphor-icons/1.4.2/css/phosphor.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FBBF24; --primary-color-transparent-1: rgba(251, 191, 36, 0.2); --primary-color-light: #FCD34D; --bg-color: #111827; --card-bg-color: rgba(31, 41, 55, 0.6); --shadow-color: rgba(251, 191, 36, 0.5);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); overflow-x: hidden; }
        .card { background-color: var(--card-bg-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid var(--primary-color-transparent-1); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3); }
        .animated-gradient-text { background: linear-gradient(90deg, var(--primary-color-light), var(--primary-color), #f9fafb, var(--primary-color), var(--primary-color-light)); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textGradientShift 4s linear infinite; }
        @keyframes textGradientShift { to { background-position: 200% center; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .input-field { background-color: #374151; border: 1px solid #4b5563; border-radius: 0.5rem; transition: border-color 0.2s, box-shadow 0.2s; color: #f3f4f6; }
        .input-field::placeholder { color: #9ca3af; }
        .input-field:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-color-transparent-1); }
        .primary-btn { transition: transform 0.2s ease, box-shadow 0.2s ease; background-color: var(--primary-color); color: #111827; }
        .primary-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -4px var(--shadow-color); }
        #map-placeholder { background-image: url('https://placehold.co/1200x800/1f2937/4b5563?text=Tirupati+Map'); }
    </style>
    <link rel="stylesheet" href="assets/floating-autos.css">
</head>
<body class="antialiased text-slate-200">
    <div class="min-h-screen flex flex-col">
        <header class="p-4 md:p-6 fade-in-up z-20">
            <nav class="container mx-auto flex justify-between items-center">
                <a href="dashboard.html" class="text-2xl font-black text-slate-50"><span class="animated-gradient-text">FairRide MBU</span></a>
                <a href="dashboard.html" class="w-10 h-10 bg-gray-800/50 backdrop-blur-sm rounded-full flex items-center justify-center border-2 border-gray-700"><i class="ph-x text-xl text-slate-300"></i></a>
            </nav>
        </header>
        <main class="flex-grow flex flex-col container mx-auto p-4 md:p-6 relative">
            <div id="map-placeholder" class="absolute inset-0 bg-cover bg-center rounded-3xl opacity-30"></div>
            <div class="relative z-10 mt-auto w-full">
                <div class="card p-6 md:p-8 max-w-lg mx-auto fade-in-up" style="animation-delay: 0.2s;">
                     <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-bold text-slate-50">Select Your Route</h1>
                        <div class="bg-green-500/20 text-green-300 text-xs font-bold px-3 py-1 rounded-full">3 autos available</div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label for="pickup" class="block text-sm font-semibold text-slate-300 mb-2">Pickup Location</label>
                            <input type="text" id="pickup" class="input-field w-full px-4 py-3" value="MBU Campus" disabled>
                        </div>
                         <div>
                            <label for="dropoff" class="block text-sm font-semibold text-slate-300 mb-2">Drop-off Location</label>
                            <input type="text" id="dropoff" class="input-field w-full px-4 py-3" placeholder="Search for a destination...">
                        </div>
<button id="confirm-btn" class="primary-btn w-full font-bold py-3 rounded-lg shadow-lg flex items-center justify-center text-lg mt-4" style="--tw-shadow-color: var(--shadow-color);">Confirm Route</button>
<p id="error-msg" class="text-red-400 text-sm text-center mt-2 hidden"></p>
                                           </div>
                </div>
            </div>
        </main>
    </div>
       <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const destination = urlParams.get('destination');
        if (destination) {
            document.getElementById('dropoff').value = decodeURIComponent(destination);
        }

        document.getElementById('confirm-btn').addEventListener('click', async () => {
            const destination = document.getElementById('dropoff').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (!destination) {
                errorMsg.textContent = 'Please enter a destination!';
                errorMsg.classList.remove('hidden');
                return;
            }

            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            const btn = document.getElementById('confirm-btn');
            btn.textContent = 'Booking...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/rides', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ destination, passengers: 1 })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Booking failed');

                // Save ride details for next pages
                localStorage.setItem('currentRideId', data.id);
                localStorage.setItem('lastDest', data.destination);
                localStorage.setItem('lastPickup', data.origin);
                localStorage.setItem('lastFare', data.fare);

                // Go to select ride page
                window.location.href = 'select_ride.html';

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                btn.textContent = 'Confirm Route';
                btn.disabled = false;
            }
        });
    });
</script>
    <script defer src="assets/floating-autos.js"></script>

</body>
</html>
