<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FairRide MBU</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FBBF24; /* Amber 400 */
            --primary-color-transparent-1: rgba(251, 191, 36, 0.2);
            --primary-color-transparent-2: rgba(251, 191, 36, 0.1);
            --primary-color-transparent-3: rgba(251, 191, 36, 0.4);
            --primary-color-light: #FCD34D; /* Amber 300 */
            --bg-color: #111827; /* Gray 900 */
            --card-bg-color: rgba(31, 41, 55, 0.6); /* Gray 800 with alpha */
            --shadow-color: rgba(251, 191, 36, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            
            
            overflow-x: hidden; /* Prevent horizontal scrollbars */
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--mx) var(--my), 
                var(--primary-color-transparent-1) 0px, 
                var(--primary-color-transparent-2) 120px,
                transparent 240px);
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        /* Lightweight laser-flow canvas like login */
        #laser-flow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* below floating autos (-1) */
            background-color: var(--bg-color);
        }
        
        #click-spark-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .signup-card {
            background-color: var(--card-bg-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid var(--primary-color-transparent-1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUpFadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        @keyframes slideUpFadeIn {
            from { opacity: 0; transform: translateY(30px) perspective(1000px); }
            to { opacity: 1; transform: translateY(0) perspective(1000px); }
        }

        .tab-container {
            background-color: #1f2937; /* Gray 800 */
            border-radius: 9999px;
            padding: 0.25rem;
            display: flex;
            position: relative;
        }

        .tab-btn {
            flex: 1; padding: 0.625rem 0; font-size: 0.875rem; font-weight: 600;
            color: #9ca3af; /* Gray 400 */
            border-radius: 9999px; cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative; z-index: 10;
        }
        
        .tab-btn:not(.active):hover { color: #f9fafb; /* Gray 50 */ transform: translateY(-2px); }
        .tab-btn.active { color: #111827; /* Gray 900 for text on yellow bg */ transform: scale(1.05); }

        .tab-highlight {
            position: absolute; top: 4px; bottom: 4px; left: 4px;
            width: calc((100% - 8px) / 2);
            background-color: var(--primary-color);
            border-radius: 9999px;
            box-shadow: 0 0 15px var(--primary-color-transparent-3);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #student-signup-tab.active ~ .tab-highlight { transform: translateX(0%); }
        #driver-signup-tab.active ~ .tab-highlight { transform: translateX(100%); }

        .forms-grid { display: grid; grid-template-columns: 1fr; }

        .form-content {
            grid-column: 1 / -1; grid-row: 1 / -1;
            opacity: 0; pointer-events: none; transform: translateY(10px);
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
        .form-content.active { opacity: 1; pointer-events: auto; transform: translateY(0px); }

        @keyframes elementFadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-content.active form > * { animation: elementFadeInUp 0.5s ease-out forwards; opacity: 0; }
        .form-content.active form > div:nth-of-type(1) { animation-delay: 0.1s; }
        .form-content.active form > div:nth-of-type(2) { animation-delay: 0.2s; }
        .form-content.active form > div:nth-of-type(3) { animation-delay: 0.3s; }
        .form-content.active form > div:nth-of-type(4) { animation-delay: 0.4s; }
        .form-content.active form > .signup-btn { animation-delay: 0.5s; }
        .form-content.active form > p { animation-delay: 0.6s; }

        .input-field {
            background-color: #374151; /* Gray 700 */
            border: 1px solid #4b5563; /* Gray 600 */
            border-radius: 0.5rem;
            transition: border-color 0.2s, box-shadow 0.2s; color: #f1f5f9;
        }
        .input-field::placeholder { color: #64748b; }
        .input-field:focus { outline: none; animation: glow-yellow 1.8s infinite; }

        @keyframes glow-yellow {
            0%, 100% { border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-color-transparent-1); }
            50% { border-color: var(--primary-color-light); box-shadow: 0 0 15px 0px var(--primary-color-transparent-3); }
        }

        .signup-btn { 
            transition: transform 0.2s ease, box-shadow 0.2s ease; 
            background-color: var(--primary-color);
            color: #111827;
        }
        .signup-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -4px var(--shadow-color);
        }
        .signup-card a { transition: color 0.2s ease-in-out; color: var(--primary-color); }
        /* Add hover effects similar to login */
        .input-field:hover { border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--primary-color-transparent-1); }
        .hover-float { transition: transform .25s ease, box-shadow .25s ease; }
        .hover-float:hover { transform: translateY(-4px); box-shadow: 0 10px 18px -8px var(--shadow-color); }
        .glow-hover { position: relative; overflow: hidden; }
        .glow-hover::after { content: ""; position: absolute; inset: -2px; background: radial-gradient(120px 40px at var(--mx) var(--my), rgba(251,191,36,0.18), transparent 70%); opacity: 0; transition: opacity .2s ease; pointer-events: none; }
        .glow-hover:hover::after { opacity: 1; }
        
        .animated-gradient-text {
            background: linear-gradient(90deg, var(--primary-color-light), var(--primary-color), #f8fafc, var(--primary-color), var(--primary-color-light));
            background-size: 200% auto; background-clip: text;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textGradientShift 4s linear infinite;
        }
        @keyframes textGradientShift { to { background-position: 200% center; } }
    </style>
    
</head>

    <canvas id="click-spark-canvas"></canvas>

    <script>
        // --- LaserFlow Canvas Effect (lightweight, same as login) ---
        (function () {
            const laserCanvas = document.getElementById('laser-flow-canvas');
            if (!laserCanvas) return;
            const ctx = laserCanvas.getContext('2d');
            let W, H, lasers = [];
            function setup() {
                W = laserCanvas.width = window.innerWidth;
                H = laserCanvas.height = window.innerHeight;
                lasers = Array.from({ length: 30 }, () => new Laser(W, H));
            }
            class Laser {
                constructor(w, h) {
                    this.w = w; this.h = h;
                    this.x = Math.random() * w; this.y = Math.random() * h;
                    this.angle = Math.random() * Math.PI * 2;
                    this.speed = 0.1 + Math.random() * 0.2;
                    this.length = 50 + Math.random() * 150;
                    this.opacity = 0.1 + Math.random() * 0.5;
                }
                update() {
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                    if (this.x < -this.length || this.x > this.w + this.length || this.y < -this.length || this.y > this.h + this.length) {
                        const side = Math.floor(Math.random() * 4);
                        if (side === 0) { this.x = -this.length; this.y = Math.random() * this.h; }
                        else if (side === 1) { this.x = this.w + this.length; this.y = Math.random() * this.h; }
                        else if (side === 2) { this.y = -this.length; this.x = Math.random() * this.w; }
                        else { this.y = this.h + this.length; this.x = Math.random() * this.w; }
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - Math.cos(this.angle) * this.length, this.y - Math.sin(this.angle) * this.length);
                    ctx.strokeStyle = `rgba(251,191,36,${this.opacity})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
            function loop() { ctx.clearRect(0, 0, W, H); lasers.forEach(l => { l.update(); l.draw(); }); requestAnimationFrame(loop); }
            window.addEventListener('resize', setup);
            setup();
            loop();
        })();

        // Mouse glow vars for background and glow-hover
        document.body.addEventListener('mousemove', (e) => { document.body.style.setProperty('--mx', `${e.clientX}px`); document.body.style.setProperty('--my', `${e.clientY}px`); });
        document.body.addEventListener('mouseleave', () => { document.body.style.setProperty('--mx', '-9999px'); document.body.style.setProperty('--my', '-9999px'); });

        // --- High-Detail LaserFlow Background using Three.js ---
        (function() {
            const mountEl = document.getElementById('laser-flow-container');
            if (!mountEl || !window.THREE) {
                // If Three.js is not loaded, just set a fallback background.
                 if(!window.THREE && mountEl) mountEl.style.backgroundColor = 'var(--bg-color)';
                return;
            }
            
            const VERT = `
                precision highp float;
                attribute vec3 position;
                void main(){
                  gl_Position = vec4(position, 1.0);
                }
            `;

            const FRAG = `
#ifdef GL_ES
#extension GL_OES_standard_derivatives : enable
#endif
precision highp float;
precision mediump int;
uniform float iTime;
uniform vec3 iResolution;
uniform vec4 iMouse;
uniform float uWispDensity;
uniform float uTiltScale;
uniform float uFlowTime;
uniform float uFogTime;
uniform float uBeamXFrac;
uniform float uBeamYFrac;
uniform float uFlowSpeed;
uniform float uVLenFactor;
uniform float uHLenFactor;
uniform float uFogIntensity;
uniform float uFogScale;
uniform float uWSpeed;
uniform float uWIntensity;
uniform float uFlowStrength;
uniform float uDecay;
uniform float uFalloffStart;
uniform float uFogFallSpeed;
uniform vec3 uColor;
uniform float uFade;
#define PI 3.14159265359
#define TWO_PI 6.28318530718
#define EPS 1e-6
#define EDGE_SOFT (DT_LOCAL*4.0)
#define DT_LOCAL 0.0038
#define TAP_RADIUS 6
#define R_H 150.0
#define R_V 150.0
#define FLARE_HEIGHT 16.0
#define FLARE_AMOUNT 8.0
#define FLARE_EXP 2.0
#define TOP_FADE_START 0.1
#define TOP_FADE_EXP 1.0
#define FLOW_PERIOD 0.5
#define FLOW_SHARPNESS 1.5
#define W_BASE_X 1.5
#define W_LAYER_GAP 0.25
#define W_LANES 55
#define W_SIDE_DECAY 0.5
#define W_HALF 0.01
#define W_AA 0.15
#define W_CELL 20.0
#define W_SEG_MIN 0.01
#define W_SEG_MAX 0.55
#define W_CURVE_AMOUNT 15.0
#define W_CURVE_RANGE (FLARE_HEIGHT - 3.0)
#define W_BOTTOM_EXP 10.0
#define FOG_ON 1
#define FOG_CONTRAST 1.5
#define FOG_SPEED_U 0.1
#define FOG_SPEED_V -0.1
#define FOG_OCTAVES 5
#define FOG_BOTTOM_BIAS 0.8
#define FOG_TILT_TO_MOUSE 0.05
#define FOG_TILT_DEADZONE 0.01
#define FOG_TILT_MAX_X 0.35
#define FOG_TILT_SHAPE 1.5
#define FOG_BEAM_MIN 0.0
#define FOG_BEAM_MAX 0.75
#define FOG_MASK_GAMMA 0.20
#define FOG_EXPAND_SHAPE 12.2
#define FOG_EDGE_MIX 0.5
#define HFOG_EDGE_START 0.20
#define HFOG_EDGE_END 0.98
#define HFOG_EDGE_GAMMA 1.4
#define HFOG_Y_RADIUS 25.0
#define HFOG_Y_SOFT 60.0
#define EDGE_X0 0.22
#define EDGE_X1 0.995
#define EDGE_X_GAMMA 1.25
#define EDGE_LUMA_T0 0.0
#define EDGE_LUMA_T1 2.0
#define DITHER_STRENGTH 1.0
float g(float x){return x<=0.00031308?12.92*x:1.055*pow(x,1.0/2.4)-0.055;}
float bs(vec2 p,vec2 q,float powr){float d=distance(p,q),f=powr*uFalloffStart,r=(f*f)/(d*d+EPS);return powr*min(1.0,r);}
float bsa(vec2 p,vec2 q,float powr,vec2 s){vec2 d=p-q; float dd=(d.x*d.x)/(s.x*s.x)+(d.y*d.y)/(s.y*s.y),f=powr*uFalloffStart,r=(f*f)/(dd+EPS);return powr*min(1.0,r);}
float tri01(float x){float f=fract(x);return 1.0-abs(f*2.0-1.0);}
float tauWf(float t,float tmin,float tmax){float a=smoothstep(tmin,tmin+EDGE_SOFT,t),b=1.0-smoothstep(tmax-EDGE_SOFT,tmax,t);return max(0.0,a*b);}
float h21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+34.123);return fract(p.x*p.y);}

                // same-origin (works if served by backend)

                'http://127.0.0.1:3001',

                    if (res.ok) { API_BASE = base; break; }

        function handleSparkClick(e) {
            const x = e.clientX; const y = e.clientY; const now = performance.now();
            const newSparks = Array.from({ length: sparkConfig.sparkCount }, (_, i) => ({ x, y, angle: (2 * Math.PI * i) / sparkConfig.sparkCount, startTime: now }));
            sparks.push(...newSparks);
        }
        function animateSparks(timestamp) {
            sparkCtx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);
            sparks = sparks.filter(spark => {
                const elapsed = timestamp - spark.startTime;
                if (elapsed >= sparkConfig.duration) return false;
                const progress = elapsed / sparkConfig.duration; const eased = easeOutQuint(progress);
                const distance = eased * sparkConfig.sparkRadius; const lineLength = sparkConfig.sparkSize * (1 - eased);
                const x1 = spark.x + distance * Math.cos(spark.angle); const y1 = spark.y + distance * Math.sin(spark.angle);
                const x2 = spark.x + (distance + lineLength) * Math.cos(spark.angle); const y2 = spark.y + (distance + lineLength) * Math.sin(spark.angle);
                sparkCtx.strokeStyle = sparkConfig.sparkColor; sparkCtx.lineWidth = 2;
                sparkCtx.beginPath(); sparkCtx.moveTo(x1, y1); sparkCtx.lineTo(x2, y2); sparkCtx.stroke();
                return true;
            });
            requestAnimationFrame(animateSparks);
        }
        window.addEventListener('resize', setupSparkCanvas);
        document.body.addEventListener('click', handleSparkClick);
        setupSparkCanvas();
        requestAnimationFrame(animateSparks);

        // (3D embeds shown above via Sketchfab iframes)
    </script>

    <script defer src="assets/defer-3d.js"></script>
    
</body>
