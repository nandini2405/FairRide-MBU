<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings - FairRide MBU</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/phosphor-icons/1.4.2/css/phosphor.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary-color: #FBBF24; --primary-color-transparent-1: rgba(251,191,36,0.2); --primary-color-light: #FCD34D; --bg-color: #111827; --card-bg-color: rgba(31,41,55,0.6); --shadow-color: rgba(251,191,36,0.5); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); overflow-x: hidden; }
        .card { background-color: var(--card-bg-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid var(--primary-color-transparent-1); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3); }
        .animated-gradient-text { background: linear-gradient(90deg, var(--primary-color-light), var(--primary-color), #f9fafb, var(--primary-color), var(--primary-color-light)); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textGradientShift 4s linear infinite; }
        @keyframes textGradientShift { to { background-position: 200% center; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
    </style>
    
</head>
<body class="antialiased text-slate-200">
    <div class="min-h-screen">
        <header class="p-4 md:p-6 fade-in-up">
            <nav class="container mx-auto flex justify-between items-center">
                <a href="driver_dashboard.html" class="text-2xl font-black text-slate-50"><span class="animated-gradient-text">My Earnings</span></a>
                <a href="driver_dashboard.html" class="inline-flex items-center gap-2 bg-gray-800/50 hover:bg-gray-700/70 border border-gray-700 text-slate-200 font-semibold px-4 py-2 rounded-xl transition-all">
                    <i class="ph-gauge text-lg text-amber-300"></i>
                    <span>Dashboard</span>
                </a>
            </nav>
        </header>

        <main class="container mx-auto p-4 md:p-6">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card p-6 fade-in-up" style="animation-delay:0.1s;">
                    <h2 class="font-bold text-sm text-slate-400 uppercase tracking-wide mb-2">Today's Earnings</h2>
                    <p id="today-amount" class="text-4xl font-extrabold text-amber-400">&#8377;0</p>
                    <p id="today-trips" class="text-sm text-gray-400 mt-1">0 trips completed</p>
                </div>
                <div class="card p-6 fade-in-up" style="animation-delay:0.2s;">
                    <h2 class="font-bold text-sm text-slate-400 uppercase tracking-wide mb-2">This Week</h2>
                    <p id="week-amount" class="text-4xl font-extrabold text-amber-400">&#8377;0</p>
                    <p id="week-trips" class="text-sm text-gray-400 mt-1">0 trips completed</p>
                </div>
                <div class="card p-6 fade-in-up" style="animation-delay:0.3s;">
                    <h2 class="font-bold text-sm text-slate-400 uppercase tracking-wide mb-2">Total Earnings</h2>
                    <p id="total-amount" class="text-4xl font-extrabold text-green-400">&#8377;0</p>
                    <p id="total-trips" class="text-sm text-gray-400 mt-1">0 trips total</p>
                </div>
            </div>

            <!-- Weekly Chart -->
            <div class="card p-6 fade-in-up mb-8" style="animation-delay:0.4s;">
                <h2 class="text-xl font-bold text-slate-100 mb-4">Weekly Performance</h2>
                <div class="h-64 bg-gray-800/50 rounded-lg p-3">
                    <canvas id="weekly-chart"></canvas>
                </div>
                <div class="mt-4 text-sm text-slate-300 flex flex-wrap gap-3">
                    <span id="weekly-total" class="bg-amber-500/10 text-amber-300 font-semibold px-3 py-1 rounded-full">Total: �</span>
                    <span id="weekly-best" class="bg-amber-500/10 text-amber-300 font-semibold px-3 py-1 rounded-full">Best day: �</span>
                </div>
            </div>

            <!-- Recent Transactions -->
            <div class="card p-6 fade-in-up" style="animation-delay:0.5s;">
                <h2 class="text-xl font-bold text-slate-100 mb-4">Recent Transactions</h2>
                <div id="transactions-list" class="space-y-3">
                    <p class="text-slate-400 text-sm text-center py-4">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('authToken');
        if (!token) { window.location.href = 'index.html'; return; }

        const nf = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 });
        const fmt = (n) => '\u20B9' + nf.format(Math.round(n || 0));

        // Default data
        let data = {
            todayEarnings: 0, todayTrips: 0,
            weekEarnings: 0, weekTrips: 0,
            totalEarnings: 0, totalTrips: 0,
            dailyData: [0,0,0,0,0,0,0],
            dailyLabels: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
            recentRides: []
        };

        // Fetch real earnings
        try {
            const res = await fetch('/api/driver/earnings', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) data = await res.json();
        } catch (e) { console.error('Earnings fetch error:', e); }

        // Update stat cards
        document.getElementById('today-amount').textContent = fmt(data.todayEarnings);
        document.getElementById('today-trips').textContent = (data.todayTrips || 0) + ' trips completed';
        document.getElementById('week-amount').textContent = fmt(data.weekEarnings);
        document.getElementById('week-trips').textContent = (data.weekTrips || 0) + ' trips completed';
        document.getElementById('total-amount').textContent = fmt(data.totalEarnings);
        document.getElementById('total-trips').textContent = (data.totalTrips || 0) + ' trips total';

        // Chart
        const ctx = document.getElementById('weekly-chart');
        if (ctx) {
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.dailyLabels,
                    datasets: [{
                        label: 'Earnings',
                        data: data.dailyData,
                        backgroundColor: 'rgba(251,191,36,0.25)',
                        borderColor: '#FBBF24',
                        borderWidth: 2,
                        borderRadius: 6,
                        hoverBackgroundColor: 'rgba(251,191,36,0.4)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: 'rgba(148,163,184,0.12)' }, ticks: { color: '#e5e7eb', font: { weight: '600' } } },
                        y: { grid: { color: 'rgba(148,163,184,0.15)' }, ticks: { color: '#e5e7eb', callback: (v) => '\u20B9' + v }, beginAtZero: true }
                    },
                    plugins: {
                        legend: { labels: { color: '#e5e7eb' } },
                        tooltip: { callbacks: { label: (c) => ' \u20B9' + c.parsed.y } }
                    }
                }
            });

            const total = data.dailyData.reduce((a,b) => a+b, 0);
            const maxVal = Math.max(...data.dailyData, 0);
            const bestIdx = data.dailyData.indexOf(maxVal);
            document.getElementById('weekly-total').textContent = 'Total: ' + fmt(total);
            document.getElementById('weekly-best').textContent = maxVal > 0
                ? 'Best day: ' + data.dailyLabels[bestIdx] + ' (' + fmt(maxVal) + ')'
                : 'No earnings this week';
        }

        // Recent transactions
        const txList = document.getElementById('transactions-list');
        if (data.recentRides && data.recentRides.length > 0) {
            txList.innerHTML = data.recentRides.map(ride => {
                const date = new Date(ride.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
                return '<div class="flex justify-between items-center bg-gray-800/50 p-3 rounded-lg">' +
                    '<div><p class="font-semibold text-slate-200">Trip to ' + ride.destination + '</p>' +
                    '<p class="text-xs text-slate-400">' + date + '</p></div>' +
                    '<p class="font-bold text-green-400">+ \u20B9' + (ride.fare || 0) + '</p></div>';
            }).join('');
        } else {
            txList.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No completed rides yet.</p>';
        }
    });
    </script>
</body>
</html>
