<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings - FairRide MBU</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/phosphor-icons/1.4.2/css/phosphor.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FBBF24; --primary-color-transparent-1: rgba(251, 191, 36, 0.2); --primary-color-light: #FCD34D; --bg-color: #111827; --card-bg-color: rgba(31, 41, 55, 0.6); --shadow-color: rgba(251, 191, 36, 0.5);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); overflow-x: hidden; }
        .card { background-color: var(--card-bg-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid var(--primary-color-transparent-1); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3); }
        .animated-gradient-text { background: linear-gradient(90deg, var(--primary-color-light), var(--primary-color), #f9fafb, var(--primary-color), var(--primary-color-light)); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textGradientShift 4s linear infinite; }
        @keyframes textGradientShift { to { background-position: 200% center; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        /* Toggle styles reused from dashboard */
        .toggle-checkbox:checked + .toggle-label { background-color: var(--primary-color); }
        .toggle-checkbox:checked + .toggle-label .toggle-ball { transform: translateX(100%); border-color: var(--primary-color); }
    </style>
    <link rel="stylesheet" href="assets/floating-autos.css">
</head>
<body class="antialiased text-slate-200">
    <div class="min-h-screen">
	        <header class="p-4 md:p-6 fade-in-up">
	            <nav class="container mx-auto flex justify-between items-center">
	                <a href="driver_dashboard.html" class="text-2xl font-black text-slate-50"><span class="animated-gradient-text">My Earnings</span></a>
	                <a href="driver_dashboard.html" class="inline-flex items-center gap-2 bg-gray-800/50 hover:bg-gray-700/70 border border-gray-700 text-slate-200 font-semibold px-4 py-2 rounded-xl transition-all duration-200 backdrop-blur-sm">
	                    <i class="ph-gauge text-lg text-amber-300"></i>
	                    <span>Dashboard</span>
	                </a>
	            </nav>
	        </header>
        <main class="container mx-auto p-4 md:p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="card p-6 fade-in-up" style="animation-delay: 0.2s;">
                    <h2 class="font-bold text-lg text-slate-100 mb-2">Today's Earnings</h2>
                    <p id="today-amount" class="text-4xl font-extrabold text-amber-400">&#8377;850</p>
                    <p class="text-sm text-gray-400">5 trips completed</p>
                </div>
                <div class="card p-6 fade-in-up" style="animation-delay: 0.3s;">
                    <h2 class="font-bold text-lg text-slate-100 mb-2">This Week</h2>
                    <p id="week-amount" class="text-4xl font-extrabold text-amber-400">&#8377;4,320</p>
                    <p class="text-sm text-gray-400">28 trips completed</p>
                </div>
            </div>
	            <div class="card mt-8 p-6 fade-in-up" style="animation-delay: 0.4s;">
	                 <h2 class="text-xl font-bold text-slate-100 mb-4">Weekly Performance</h2>
	                 <div class="h-64 bg-gray-800/50 rounded-lg p-3">
	                    <canvas id="weekly-chart"></canvas>
                 </div>
                 <div class="mt-4 text-sm text-slate-300 flex flex-wrap gap-3">
                    <span id="weekly-total" class="bg-amber-500/10 text-amber-300 font-semibold px-3 py-1 rounded-full">Total: &mdash;</span>
                    <span id="weekly-best" class="bg-amber-500/10 text-amber-300 font-semibold px-3 py-1 rounded-full">Best day: &mdash;</span>
                 </div>
            </div>
             <div class="card mt-8 p-6 fade-in-up" style="animation-delay: 0.5s;">
                 <h2 class="text-xl font-bold text-slate-100 mb-4">Recent Transactions</h2>
                 <div class="space-y-3">
                     <div class="flex justify-between items-center bg-gray-800/50 p-3 rounded-lg"><p>Trip to Railway Station</p><p class="font-bold text-green-400">+ &#8377;170</p></div>
                     <div class="flex justify-between items-center bg-gray-800/50 p-3 rounded-lg"><p>Trip to D-Mart</p><p class="font-bold text-green-400">+ &#8377;120</p></div>
                 </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('weekly-chart');
            if (!ctx) return;

            const nf = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 });
            const formatINR = (n) => `\u20B9${nf.format(Math.round(n))}`;

            // Generate last 7 day labels (Mon..Sun order based on today)
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const days = [...Array(7)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                return dayNames[d.getDay()];
            });

            // Sample base earnings data (Rs.) aligned to labels above
            // Sums to Rs.4,320 with today = Rs.850 to match the cards
            const baseEarnings = [500, 480, 560, 620, 520, 790, 850];

            // UI elements
	            const totalEl = document.getElementById('weekly-total');
	            const bestEl = document.getElementById('weekly-best');
	            const todayAmountEl = document.getElementById('today-amount');
	            const weekAmountEl = document.getElementById('week-amount');
	            const applied = () => [...baseEarnings];

            // Chart setup
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: days,
                    datasets: [{
                        label: 'Earnings (Rs.)',
                        data: applied(),
                        backgroundColor: 'rgba(251, 191, 36, 0.25)',
                        borderColor: '#FBBF24',
                        borderWidth: 2,
                        borderRadius: 6,
                        hoverBackgroundColor: 'rgba(251, 191, 36, 0.4)',
                        hoverBorderColor: '#F59E0B'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            grid: { color: 'rgba(148, 163, 184, 0.12)' },
                            ticks: { color: '#e5e7eb', font: { weight: '600' } }
                        },
                        y: {
                            grid: { color: 'rgba(148, 163, 184, 0.15)' },
                            ticks: { color: '#e5e7eb', callback: (v) => `\u20B9${v}` },
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#e5e7eb' } },
                        tooltip: { callbacks: { label: (ctx) => ` \u20B9${ctx.parsed.y}` } }
                    }
                }
            });

	            function updateDerived() {
	                const values = applied();
	                const total = values.reduce((a, b) => a + b, 0);
	                const maxVal = Math.max(...values);
	                const bestIdx = values.indexOf(maxVal);
	                const bestDay = days[bestIdx];

	                if (totalEl) totalEl.textContent = `Total: ${formatINR(total)}`;
	                if (bestEl) bestEl.textContent = `Best day: ${bestDay} (${formatINR(maxVal)})`;

	                // Today = last point in the 7-day series
	                const todayVal = values[values.length - 1];
	                if (todayAmountEl) todayAmountEl.textContent = formatINR(todayVal);

	                // Week summary card amount
	                if (weekAmountEl) weekAmountEl.textContent = formatINR(total);
	            }

            function updateChart() {
                chart.data.datasets[0].data = applied();
                chart.update();
            }

	            // Initial paint
	            updateDerived();
	        });
	    </script>
    <script defer src="assets/floating-autos.js"></script>

</body>
</html>
