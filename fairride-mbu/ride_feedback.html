<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Ride - FairRide MBU</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/phosphor-icons/1.4.2/css/phosphor.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #FBBF24; --bg-color: #111827; --card-bg-color: rgba(31,41,55,0.6); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); }
        .card { background-color: var(--card-bg-color); backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid rgba(251,191,36,0.2); }
        .star { cursor: pointer; transition: transform .15s ease; }
        .star:hover { transform: scale(1.12); }
        .tag { padding: 6px 10px; border-radius: 9999px; border: 1px solid #4b5563; background: rgba(31,41,55,.5); cursor: pointer; font-weight: 600; }
        .tag.active { border-color: var(--primary-color); background: rgba(251,191,36,0.1); color: #FBBF24; }
        .tip-btn { padding: 8px 16px; border-radius: 9999px; border: 1px solid #4b5563; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .tip-btn.active { border-color: var(--primary-color); background: rgba(251,191,36,0.1); color: #FBBF24; }
        .submit-btn { background-color: var(--primary-color); color: #111827; transition: transform 0.2s ease; }
        .submit-btn:hover { transform: translateY(-2px); }
        .animated-gradient-text { background: linear-gradient(90deg, #FCD34D, #FBBF24, #f9fafb, #FBBF24, #FCD34D); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textGradientShift 4s linear infinite; }
        @keyframes textGradientShift { to { background-position: 200% center; } }
    </style>
</head>
<body class="antialiased text-slate-200 min-h-screen">
    <header class="p-4">
        <nav class="container mx-auto flex justify-between items-center">
            <span class="text-2xl font-black"><span class="animated-gradient-text">FairRide MBU</span></span>
            <a href="dashboard.html" class="w-10 h-10 bg-gray-700 rounded-full flex items-center justify-center border-2 border-gray-600">
                <i class="ph-x text-xl text-slate-300"></i>
            </a>
        </nav>
    </header>

    <main class="container mx-auto p-4 max-w-md">
        <div class="card p-6">
            <!-- Driver Info -->
            <div class="flex items-center gap-4 mb-6">
                <div id="driver-avatar" class="w-16 h-16 rounded-full bg-amber-500/20 border-2 border-amber-500/40 flex items-center justify-center text-2xl font-bold text-amber-400">R</div>
                <div>
                    <p id="driver-name" class="text-xl font-bold text-white">Your Driver</p>
                    <p id="driver-vehicle" class="text-sm text-slate-400">Auto Rickshaw</p>
                </div>
            </div>

            <!-- Star Rating -->
            <div class="mb-6">
                <p class="font-semibold text-slate-200 mb-2">Rate your trip</p>
                <div id="stars" class="flex items-center gap-2 text-amber-400">
                    <button type="button" class="star text-3xl" data-star="1">&#9733;</button>
                    <button type="button" class="star text-3xl" data-star="2">&#9733;</button>
                    <button type="button" class="star text-3xl" data-star="3">&#9733;</button>
                    <button type="button" class="star text-3xl" data-star="4">&#9733;</button>
                    <button type="button" class="star text-3xl" data-star="5">&#9733;</button>
                </div>
                <p class="text-xs text-slate-400 mt-1">Rating is optional.</p>
            </div>

            <!-- Tags -->
            <div class="mb-6">
                <p class="font-semibold text-slate-200 mb-3">What stood out?</p>
                <div class="flex flex-wrap gap-2">
                    <button class="tag text-slate-300 text-sm" data-tag="Polite">Polite</button>
                    <button class="tag text-slate-300 text-sm" data-tag="Safe driving">Safe driving</button>
                    <button class="tag text-slate-300 text-sm" data-tag="Clean vehicle">Clean vehicle</button>
                    <button class="tag text-slate-300 text-sm" data-tag="On time">On time</button>
                    <button class="tag text-slate-300 text-sm" data-tag="Helpful">Helpful</button>
                    <button class="tag text-slate-300 text-sm" data-tag="Music too loud">Music too loud</button>
                    <button class="tag text-slate-300 text-sm" data-tag="Rash driving">Rash driving</button>
                </div>
            </div>

            <!-- Comment -->
            <div class="mb-6">
                <p class="font-semibold text-slate-200 mb-2">Leave a feedback (optional)</p>
                <textarea id="comment" rows="3" placeholder="Your feedback helps improve rides" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-amber-400 resize-none"></textarea>
            </div>

            <!-- Tip -->
            <div class="mb-6">
                <p class="font-semibold text-slate-200 mb-3">Tip your driver (optional)</p>
                <div class="flex flex-wrap gap-2">
                    <button class="tip-btn text-slate-300 text-sm active" data-tip="0">No Tip</button>
                    <button class="tip-btn text-slate-300 text-sm" data-tip="10">&#8377;10</button>
                    <button class="tip-btn text-slate-300 text-sm" data-tip="20">&#8377;20</button>
                    <button class="tip-btn text-slate-300 text-sm" data-tip="30">&#8377;30</button>
                </div>
            </div>

            <!-- Submit -->
            <button id="submit-btn" class="submit-btn w-full font-bold py-3 rounded-xl text-lg">
                Submit Feedback
            </button>
        </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('authToken');
        const rideId = localStorage.getItem('currentRideId');

        // Load driver info
        const driverName = localStorage.getItem('lastRiderName') || 'Your Driver';
        const driverNameEl = document.getElementById('driver-name');
        const driverAvatarEl = document.getElementById('driver-avatar');
        if (driverNameEl) driverNameEl.textContent = driverName;
        if (driverAvatarEl) driverAvatarEl.textContent = driverName.charAt(0).toUpperCase();

        // Stars
        let selectedRating = 0;
        const stars = document.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = Number(star.dataset.star);
                stars.forEach(s => {
                    s.style.opacity = Number(s.dataset.star) <= selectedRating ? '1' : '0.3';
                });
            });
            star.addEventListener('mouseover', () => {
                stars.forEach(s => {
                    s.style.opacity = Number(s.dataset.star) <= Number(star.dataset.star) ? '1' : '0.3';
                });
            });
            star.addEventListener('mouseout', () => {
                stars.forEach(s => {
                    s.style.opacity = Number(s.dataset.star) <= selectedRating ? '1' : '0.3';
                });
            });
        });

        // Tags
        const selectedTags = new Set();
        document.querySelectorAll('.tag').forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('active');
                if (selectedTags.has(tag.dataset.tag)) selectedTags.delete(tag.dataset.tag);
                else selectedTags.add(tag.dataset.tag);
            });
        });

        // Tips
        let selectedTip = 0;
        document.querySelectorAll('.tip-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTip = Number(btn.dataset.tip);
            });
        });

        // Submit
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const comment = document.getElementById('comment').value.trim();
            if (!token || !rideId) {
                window.location.href = 'dashboard.html';
                return;
            }
            try {
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ rideId: Number(rideId), rating: selectedRating, tags: Array.from(selectedTags), comment, tip: selectedTip })
                });
            } catch (e) { console.error(e); }
            localStorage.removeItem('currentRideId');
            localStorage.removeItem('paymentCompleted');
            window.location.href = 'dashboard.html';
        });
    });
    </script>
</body>
</html>
